name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# gap-analysis #24: cancel superseded runs so a rapid push/PR sequence does not
# queue a full 2-OS matrix per commit. Keyed per workflow + ref (push runs on a
# branch and its PR share a ref, so the newer run wins).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token (enterprise/supply-chain hardening): the
# workflow only reads the repo. Actions are pinned to commit SHAs below.
permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      # G15: validate on Linux (typical CI/CD consumers) and macOS (developer
      # machines). Windows support is tracked separately (D5 / DX1).
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # G16: supply-chain gate — fail on any high/critical advisory in
      # production dependencies (kept at 0 vulnerabilities as of 2026-06-12).
      - name: Security audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high

      # `npm run build` compiles every workspace with `tsc` (each package's
      # `prepack`), which type-checks the whole tree — so a separate `typecheck`
      # step (byte-identical to `build`) was pure duplication and was dropped
      # (gap-analysis #24).
      - name: Build all workspaces (also type-checks via tsc)
        run: npm run build

      - name: Lint core + mcp-server (zero warnings)
        run: npm run lint

      - name: Test @syncro-now-ai/core
        run: npm run test:core

      - name: Test @syncro-now-ai/mcp-server
        run: npm run test:mcp

      - name: Test shared packages (@syncro-now-ai/jira + credential-store)
        run: npm run test:shared

      - name: Coverage gates (core jest thresholds 92/79/89/92, mcp lines>=70% branches>=70%)
        run: npm run test:coverage:gates

      # SKIP_TESTS=1: the mcp suite already ran in the two steps above, so the
      # governance gate skips its redundant third run and only re-checks the
      # tool contract / docs drift / release checklist (gap-analysis #24).
      - name: Quality gates (tool contract, docs drift, release checklist)
        run: npm run quality:all
        env:
          SKIP_TESTS: "1"

      - name: Upload core coverage artifact
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-coverage
          path: packages/core/coverage
          if-no-files-found: ignore

      # Codecov now measures the full tested surface: one flagged upload per
      # workspace that ships a jest suite (core, jira, credential-store,
      # sn-transport). The untested build-tool plugin packages and mcp-server
      # (own node --test gate) are excluded via codecov.yml `ignore`. The 90%
      # project floor is enforced by Codecov's PR status check, so a transient
      # upload error must not fail CI (fail_ci_if_error: false); disable_search
      # keeps Codecov from double-counting the cobertura report core also emits.
      - name: Upload core coverage to Codecov
        if: always() && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/core/coverage/lcov.info
          flags: core
          name: core
          disable_search: true
          fail_ci_if_error: false

      - name: Upload jira coverage to Codecov
        if: always() && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/jira/coverage/lcov.info
          flags: jira
          name: jira
          disable_search: true
          fail_ci_if_error: false

      - name: Upload credential-store coverage to Codecov
        if: always() && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/credential-store/coverage/lcov.info
          flags: credential-store
          name: credential-store
          disable_search: true
          fail_ci_if_error: false

      - name: Upload sn-transport coverage to Codecov
        if: always() && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/sn-transport/coverage/lcov.info
          flags: sn-transport
          name: sn-transport
          disable_search: true
          fail_ci_if_error: false

  # G16: secret scanning across the full git history. Test fixtures and example
  # files use placeholder credentials and are allowlisted in .gitleaks.toml.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
